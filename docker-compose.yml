services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextwin
      POSTGRES_PASSWORD: nextwin
      POSTGRES_DB: nextwin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextwin -d nextwin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://nextwin:nextwin@postgres:5432/nextwin_db
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      AUTO_CREATE_TABLES: "true"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
